{% extends "base.html" %}

{% block body %}
<!-- Public topbar -->
<header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">

    <!-- Brand -->
    <a href="/" class="text-xl font-bold bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 bg-clip-text text-transparent">
      Finanpy
    </a>

    <!-- Navigation links -->
    <nav class="flex items-center gap-3">
      <a href="{% url 'users:login' %}"
         class="inline-flex items-center justify-center rounded-xl border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-medium text-slate-100 transition hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-emerald-500/40">
        Entrar
      </a>
      <a href="{% url 'users:signup' %}"
         class="inline-flex items-center justify-center rounded-xl bg-gradient-to-r from-emerald-500 to-teal-500 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-emerald-500/20 transition hover:from-emerald-600 hover:to-teal-600 focus:outline-none focus:ring-2 focus:ring-emerald-400">
        Cadastrar
      </a>
    </nav>

  </div>
</header>

<!-- Page content -->
<main>
  {% block content %}{% endblock %}
</main>

<!-- Public footer -->
<footer class="border-t border-slate-800 py-6 text-center text-sm text-slate-400">
  &copy; 2026 Finanpy
</footer>
{% endblock %}
