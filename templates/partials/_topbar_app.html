<!-- Authenticated topbar -->
<header class="flex h-16 flex-shrink-0 items-center justify-between border-b border-slate-800 bg-slate-900/50 px-4 backdrop-blur md:px-6">

  <!-- Left side: hamburger (mobile) + brand (mobile) -->
  <div class="flex items-center gap-3">

    <!-- Hamburger button — mobile only -->
    <button
      type="button"
      @click="sidebarOpen = !sidebarOpen"
      class="inline-flex items-center justify-center rounded-xl p-2 text-slate-400 transition hover:bg-slate-800 hover:text-slate-100 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 md:hidden"
      :aria-expanded="sidebarOpen"
      aria-label="Abrir menu de navegação"
    >
      <!-- Hamburger icon (shown when sidebar is closed) -->
      <svg x-show="!sidebarOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
      <!-- Close icon (shown when sidebar is open) -->
      <svg x-show="sidebarOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Brand — mobile only (sidebar is hidden) -->
    <a href="{% url 'dashboard' %}"
       class="text-lg font-bold bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 bg-clip-text text-transparent transition focus:outline-none focus:ring-2 focus:ring-emerald-500/40 rounded md:hidden">
      Finanpy
    </a>

  </div>

  <!-- Spacer (desktop) -->
  <div class="hidden md:block"></div>

  <!-- Authenticated user -->
  <div class="flex items-center gap-3">
    {% if request.user.profile.avatar %}
      <img src="{{ request.user.profile.avatar.url }}"
           alt="Foto de perfil"
           class="h-8 w-8 rounded-full object-cover ring-2 ring-emerald-500/40">
    {% else %}
      <div class="flex h-8 w-8 items-center justify-center rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold" aria-hidden="true">
        {{ request.user.email|first|upper }}
      </div>
    {% endif %}
    <span class="hidden text-sm text-slate-300 sm:block">{{ request.user.email }}</span>
  </div>

</header>
