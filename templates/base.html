{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}Finanpy{% endblock %}</title>

  <!-- PWA and Manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="{% static 'img/icon-192x192.png' %}">
  <meta name="theme-color" content="#10b981">

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finanpy">
  <link rel="apple-touch-icon" href="{% static 'img/icon-192x192.png' %}">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- TailwindCSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js via CDN — required for mobile sidebar toggle -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>

  {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased">

  <!-- Skip to main content — visible on keyboard focus only -->
  <a href="#main-content"
     class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-[9999] focus:rounded-xl focus:bg-emerald-500 focus:px-4 focus:py-2 focus:text-sm focus:font-semibold focus:text-white focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:ring-offset-2 focus:ring-offset-slate-950">
    Ir para o conteúdo principal
  </a>

  {% block body %}{% endblock %}

  {% block extra_scripts %}
  <script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/serviceworker.js')
          .then((registration) => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, (err) => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }

    // PWA Install Prompt Logic
    let deferredPrompt;
    const installContainers = [
      document.getElementById('install-button-container'),
      document.getElementById('install-button-public-container')
    ];
    const installButtons = [
      document.getElementById('install-button'),
      document.getElementById('install-button-public')
    ];

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Show all install buttons found on the page
      installContainers.forEach(container => {
        if (container) container.classList.remove('hidden');
      });
    });

    installButtons.forEach(btn => {
      if (btn) {
        btn.addEventListener('click', (e) => {
          installContainers.forEach(container => {
            if (container) container.classList.add('hidden');
          });
          
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
              if (choiceResult.outcome === 'accepted') {
                console.log('User accepted the A2HS prompt');
              }
              deferredPrompt = null;
            });
          }
        });
      }
    });

    window.addEventListener('appinstalled', (evt) => {
      console.log('Finanpy was installed.');
    });
  </script>
  {% endblock %}
</body>
</html>
